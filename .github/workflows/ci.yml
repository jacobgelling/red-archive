name: CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake clang-tidy

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        run: test -f build/compile_commands.json || { echo "Missing build/compile_commands.json — run cmake configure first"; exit 0; } ; find src include -type f ( -name ".c" -o -name ".h" ) -print0 | xargs -0 --no-run-if-empty clang-tidy -p build --
