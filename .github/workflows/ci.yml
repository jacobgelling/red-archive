name: CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake clang-tidy

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_USE_RELATIVE_PATHS=ON

      - name: Run clang-tidy
        run: |
          find src include -type f \( -name "*.c" -o -name "*.h" \) -print0 \
            | xargs -0 -r clang-tidy -p build --warnings-as-errors=* 2>&1 \
            | sed -E "s#^$PWD/([^:]+):([0-9]+):([0-9]+): (warning|error): (.*)$#::\3 file=\1,line=\2,col=\3,title=clang-tidy::\5#"